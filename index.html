<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Calculadora</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/4/4b/Apple_Calculator_icon.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="magic-zone"></div>
    <div id="app">
        <div class="header">
            <div class="header-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" class="clock-svg">
                    <circle cx="12" cy="12" r="10" stroke="white" stroke-width="1.5"></circle>
                    <polyline points="12 6 12 12 16 14" stroke="white" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round"></polyline>
                </svg>
            </div>
            <div class="header-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" class="calc-svg">
                    <rect x="5" y="3" width="14" height="18" rx="2" ry="2" stroke="white" stroke-width="1.5"></rect>
                    <line x1="8" y1="7" x2="16" y2="7" stroke="white" stroke-width="1.5" stroke-linecap="round"></line>
                    <line x1="16" y1="11" x2="16" y2="11" stroke="white" stroke-width="2" stroke-linecap="round"></line>
                    <line x1="12" y1="11" x2="12" y2="11" stroke="white" stroke-width="2" stroke-linecap="round"></line>
                    <line x1="8" y1="11" x2="8" y2="11" stroke="white" stroke-width="2" stroke-linecap="round"></line>
                    <line x1="16" y1="15" x2="16" y2="15" stroke="white" stroke-width="2" stroke-linecap="round"></line>
                    <line x1="12" y1="15" x2="12" y2="15" stroke="white" stroke-width="2" stroke-linecap="round"></line>
                    <line x1="8" y1="15" x2="8" y2="15" stroke="white" stroke-width="2" stroke-linecap="round"></line>
                    <line x1="16" y1="19" x2="16" y2="19" stroke="white" stroke-width="2" stroke-linecap="round"></line>
                    <line x1="12" y1="19" x2="12" y2="19" stroke="white" stroke-width="2" stroke-linecap="round"></line>
                    <line x1="8" y1="19" x2="8" y2="19" stroke="white" stroke-width="2" stroke-linecap="round"></line>
                </svg>
            </div>
        </div>
        <div class="display">
            <span id="display-text">0</span>
        </div>
        <div class="keypad-wrapper">
            <div class="keypad">
                <button class="btn btn-gray icon-btn" id="btn-backspace">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" class="backspace-svg">
                        <path d="M8.5 4h11.5A2.5 2.5 0 0 1 22.5 6.5v11a2.5 2.5 0 0 1-2.5 2.5H8.5L2 12l6.5-8z"
                            stroke="white" stroke-width="1.5" stroke-linejoin="round" />
                        <line x1="12" y1="9" x2="18" y2="15" stroke="white" stroke-width="1.5" stroke-linecap="round" />
                        <line x1="18" y1="9" x2="12" y2="15" stroke="white" stroke-width="1.5" stroke-linecap="round" />
                    </svg>
                </button>
                <button class="btn btn-gray" id="btn-clear">AC</button>
                <button class="btn btn-gray" id="btn-percent">%</button>
                <button class="btn btn-orange op-btn" id="btn-divide" data-op="÷">÷</button>

                <button class="btn btn-dark num-btn" data-num="7">7</button>
                <button class="btn btn-dark num-btn" data-num="8">8</button>
                <button class="btn btn-dark num-btn" data-num="9">9</button>
                <button class="btn btn-orange op-btn" id="btn-multiply" data-op="×">×</button>

                <button class="btn btn-dark num-btn" data-num="4">4</button>
                <button class="btn btn-dark num-btn" data-num="5">5</button>
                <button class="btn btn-dark num-btn" data-num="6">6</button>
                <button class="btn btn-orange op-btn" id="btn-subtract" data-op="-">−</button>

                <button class="btn btn-dark num-btn" data-num="1">1</button>
                <button class="btn btn-dark num-btn" data-num="2">2</button>
                <button class="btn btn-dark num-btn" data-num="3">3</button>
                <button class="btn btn-orange op-btn" id="btn-add" data-op="+">+</button>

                <button class="btn btn-dark" id="btn-sign"><span>+</span><span
                        style="font-size:22px">/</span><span>−</span></button>
                <button class="btn btn-dark num-btn" data-num="0">0</button>
                <button class="btn btn-dark" id="btn-comma">,</button>
                <button class="btn btn-orange" id="btn-equal">=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
